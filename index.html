<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro Comercial · Inicio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <style>
    .home-wrap {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px;
      background: linear-gradient(135deg, #F4F6FB 0%, #E8EDF5 100%);
    }
    .home-card {
      background: #FFFFFF;
      border-radius: 20px;
      padding: 40px 48px;
      box-shadow: 0 12px 40px rgba(20, 30, 70, 0.08);
      max-width: 720px; width: 100%;
      text-align: center;
    }
    .home-logo { max-width: 120px; margin: 0 auto 16px; display: block; }
    .home-title {
      font-family: 'Fraunces', serif;
      font-size: 32px; font-weight: 500;
      color: #1A2B4C; margin: 8px 0;
    }
    .home-sub { color: #6B7383; font-size: 15px; margin-bottom: 32px; }
    .commercial-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }
    @media (min-width: 720px) {
      .commercial-grid { grid-template-columns: repeat(4, 1fr); }
    }
    .commercial-btn {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 8px; padding: 24px 12px;
      border: 2px solid #E5E9F2; border-radius: 14px;
      background: #FFFFFF; color: #1A2B4C;
      font-family: inherit; font-size: 17px; font-weight: 600;
      cursor: pointer; text-decoration: none;
      transition: all .18s ease;
    }
    .commercial-btn:hover {
      border-color: #1A73E8;
      background: #F4F8FF;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(26, 115, 232, 0.12);
    }
    .commercial-avatar {
      width: 56px; height: 56px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: #FFFFFF; font-family: 'Fraunces', serif;
      font-size: 24px; font-weight: 500;
    }
    .avatar-natalia  { background: #1B9E5A; }
    .avatar-angela   { background: #1A73E8; }
    .avatar-rosemary { background: #E37400; }
    .avatar-nirvana  { background: #8E44AD; }
    .home-footer { margin-top: 32px; color: #9CA3AF; font-size: 13px; }
  </style>
</head>
<body>
  <div class="home-wrap">
    <div class="home-card">
      <img src="LOGO.png" alt="Logo" class="home-logo" onerror="this.style.display='none';" />
      <h1 class="home-title">Sistema de Registro Comercial</h1>
      <p class="home-sub">Selecciona tu perfil para empezar a registrar llamadas</p>
      <div class="commercial-grid">
        <a href="natalia.html" class="commercial-btn"><span class="commercial-avatar avatar-natalia">N</span>Natalia</a>
        <a href="angela.html" class="commercial-btn"><span class="commercial-avatar avatar-angela">A</span>Angela</a>
        <a href="rosemary.html" class="commercial-btn"><span class="commercial-avatar avatar-rosemary">R</span>Rosemary</a>
        <a href="nirvana.html" class="commercial-btn"><span class="commercial-avatar avatar-nirvana">N</span>Nirvana</a>
      </div>

      <div style="margin-top: 24px; padding-top: 24px; border-top: 1px solid #E5E9F2;">
        <p style="color: #6B7383; font-size: 13px; margin-bottom: 12px;">Panel de administración</p>
        <a href="tamia.html" class="commercial-btn" style="display: inline-flex; padding: 16px 32px;">
          <span class="commercial-avatar" style="background: #1A2B4C;">T</span>
          Tamia · Admin
        </a>
      </div>

      <p class="home-footer">© MTE · Registro de llamadas comerciales</p>
    </div>
  </div>
</body>
</html>
