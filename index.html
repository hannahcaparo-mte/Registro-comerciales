<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro Comercial · Inicio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#f7f5f1; --bg-elevated:#ffffff; --ink:#1a1a1a;
      --ink-soft:#5a5a5a; --ink-muted:#8a8a8a; --line:#e5e1d8;
      --accent:#1e4d3a; --accent-hover:#163a2c; --accent-soft:#e8efe9;
      --font-display:'Fraunces','Times New Roman',serif;
      --font-body:'Inter Tight',-apple-system,BlinkMacSystemFont,sans-serif;
      --radius:10px; --radius-lg:14px;
      --shadow-md:0 4px 16px rgba(20,20,20,.06);
      --shadow-lg:0 12px 40px rgba(20,20,20,.08);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{
      background:var(--bg);color:var(--ink);
      font-family:var(--font-body);min-height:100vh;
      -webkit-font-smoothing:antialiased;
    }
    .wrap{
      min-height:100vh;display:flex;flex-direction:column;
      align-items:center;justify-content:center;padding:32px 20px;
    }
    .head{text-align:center;margin-bottom:40px}
    .eyebrow{
      font-size:12px;letter-spacing:.14em;text-transform:uppercase;
      color:var(--ink-muted);font-weight:600;margin-bottom:10px;
    }
    .title{
      font-family:var(--font-display);font-weight:600;
      font-size:34px;line-height:1.15;color:var(--ink);
    }
    .sub{
      margin-top:10px;color:var(--ink-soft);font-size:15px;
    }
    .cards{
      display:flex;gap:18px;flex-wrap:wrap;justify-content:center;
      width:100%;max-width:760px;
    }
    .card{
      flex:1 1 200px;min-width:200px;max-width:240px;
      background:var(--bg-elevated);border:1px solid var(--line);
      border-radius:var(--radius-lg);padding:32px 24px;
      text-decoration:none;color:inherit;text-align:center;
      box-shadow:var(--shadow-md);
      transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
      display:flex;flex-direction:column;align-items:center;gap:14px;
    }
    .card:hover{
      transform:translateY(-4px);
      box-shadow:var(--shadow-lg);
      border-color:var(--accent);
    }
    .avatar{
      width:64px;height:64px;border-radius:50%;
      background:var(--accent-soft);color:var(--accent);
      display:flex;align-items:center;justify-content:center;
      font-family:var(--font-display);font-weight:600;font-size:26px;
    }
    .name{
      font-family:var(--font-display);font-weight:600;font-size:22px;
    }
    .go{
      font-size:13px;color:var(--accent);font-weight:600;
      letter-spacing:.02em;
    }
    .foot{
      margin-top:42px;color:var(--ink-muted);font-size:12.5px;
      text-align:center;
    }
    @media (max-width:560px){
      .title{font-size:26px}
      .cards{flex-direction:column;align-items:center}
      .card{max-width:320px;width:100%}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <p class="eyebrow">Registro de llamadas</p>
      <h1 class="title">¿Quién va a registrar?</h1>
      <p class="sub">Selecciona tu nombre para empezar.</p>
    </div>

    <div class="cards">
      <a class="card" href="natalia.html">
        <div class="avatar">N</div>
        <div class="name">Natalia</div>
        <div class="go">Entrar →</div>
      </a>
      <a class="card" href="angela.html">
        <div class="avatar">A</div>
        <div class="name">Angela</div>
        <div class="go">Entrar →</div>
      </a>
      <a class="card" href="rosemary.html">
        <div class="avatar">R</div>
        <div class="name">Rosemary</div>
        <div class="go">Entrar →</div>
      </a>
    </div>

    <p class="foot">Cada registro se guarda automáticamente en la hoja de cálculo.</p>
  </div>
</body>
</html>
